{% extends "base.html" %}
{% block title %}Nuevo Cliente{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">REGISTRAR CLIENTE</h1>
  <a href="{{ next_url }}" class="btn-secondary">Volver</a>
</div>

<div class="form-card">
  <form method="POST">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" name="nombre" required>
      </div>
      <div class="form-group">
        <label>Edad</label>
        <input type="number" name="edad" min="10" max="99" required>
      </div>
    </div>
    <div class="form-group">
      <label>Cedula</label>
      <input type="number" name="cedula" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Direccion (opcional)</label>
        <input type="text" name="direccion" placeholder="Se genera automaticamente">
      </div>
      <div class="form-group">
        <label>Telefono (opcional)</label>
        <input type="text" name="telefono" placeholder="Se genera automaticamente">
      </div>
    </div>
    <button type="submit" class="btn-primary btn-full">REGISTRAR CLIENTE</button>
  </form>
</div>
{% endblock %}
